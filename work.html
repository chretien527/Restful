<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .header{
            background-color: blue;
            height: 10vh;
            color: white;
            text-align: center;
        }

        .row{
            display: flex;
            width: 100%;
        }

        .row div{
            float: left;
            width: 25%;
            text-align: center;
            color: white;
            height: 60vh;
        }

        .class1{ background-color: white;}
        .class2{ background-color: blue;}
        .class3{ background-color:white};
        .class4{ background-color: blue; height: 80vh}
        .class5{
            background-color: white;
            height: 10vh;
            width: 75vh;
            text-align: center;
        }
        .class6{
            background-color: blue;
            height: 10vh;
            width: 75vh;
            text-align: center;
        }
        .class7{
            background-color: white;
            height: 10vh;
            width: 100vh;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">H</div>
    <div class="row">
        <div class="class1">Content1</div>
        <div class="class2">Content2</div>
        <div class="class3">Content3</div>
        <div class="class4">Content4</div>
    </div>
    <div class="class5"></div>
    <div class="class6"></div>
    <div class="class7"></div>
</body>
</html>
